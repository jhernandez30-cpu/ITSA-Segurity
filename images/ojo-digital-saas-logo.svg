		<circle cx="810" cy="231" r="13"/>
		<circle cx="824" cy="377" r="13"/>
	</g>
	<path d="M480 86l206 76v139c0 139-82 246-206 305-124-59-206-166-206-305V162l206-76z" fill="#071426" stroke="url(#shield)" stroke-width="12" filter="url(#glow)"/>
	<path d="M480 142l151 56v106c0 98-56 176-151 224-95-48-151-126-151-224V198l151-56z" fill="#0b1f37" stroke="#7defff" stroke-opacity="0.65" stroke-width="4"/>
