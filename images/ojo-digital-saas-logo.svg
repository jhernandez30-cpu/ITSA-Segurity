<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
	<title id="title">Ojo Digital SaaS</title>
	<desc id="desc">Logo de Ojo Digital SaaS de ITSA SEGURITY con escudo, ojo digital y colores cian, verde y azul.</desc>
	<defs>
		<linearGradient id="shield" x1="160" y1="80" x2="800" y2="620" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#00d4ff"/>
			<stop offset="0.52" stop-color="#006dff"/>
			<stop offset="1" stop-color="#16f2a5"/>
		</linearGradient>
		<linearGradient id="eye" x1="230" y1="250" x2="730" y2="430" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#7defff"/>
